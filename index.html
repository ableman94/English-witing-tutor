
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에릭권의 영작문 클래스 (AI Writing Tutor)</title>
    
    <!-- SEO & Social Sharing -->
    <meta property="og:title" content="에릭권의 영작문 클래스">
    <meta property="og:description" content="AI가 분석하는 나의 손글씨 영어 일기 피드백">
    <meta property="og:type" content="website">

    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel for In-Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .score-bar { transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        b.correction-mark { color: #4f46e5; font-weight: 800; background-color: #eef2ff; padding: 0 4px; border-radius: 4px; text-decoration: underline; text-underline-offset: 4px; }
        .drag-over { border-color: #4f46e5 !important; background-color: #f5f3ff !important; transform: scale(1.01); }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [showToast, setShowToast] = useState(false);
            const fileInputRef = useRef(null);

            // 이미지 처리 공통 함수
            const processFile = (file) => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImage(ev.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                } else {
                    setError("이미지 파일만 업로드할 수 있습니다.");
                }
            };

            const handleFileChange = (e) => processFile(e.target.files[0]);

            // 드래그 앤 드롭 이벤트 핸들러
            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = () => setIsDragging(false);
            const onDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                processFile(file);
            };

            const handleAnalyze = async () => {
                if (!image) return;
                setLoading(true);
                setError(null);

                try {
                    const { GoogleGenAI, Type } = await import("https://esm.sh/@google/genai@^1.41.0");
                    const apiKey = window.process?.env?.API_KEY;
                    
                    if (!apiKey) {
                        throw new Error("API 키를 찾을 수 없습니다. 환경 설정을 확인해주세요.");
                    }

                    const ai = new GoogleGenAI({ apiKey });
                    const model = 'gemini-3-flash-preview';

                    const prompt = `
                        Analyze the handwritten English text in this image.
                        1. Transcribe the text into 'transcription'.
                        2. Correct it into 'fullCorrectedText', wrapping all changed/improved parts in <b> tags.
                        3. Provide scores (0-10) for grammar, vocabulary, and naturalness.
                        4. List specific 'corrections' as objects with {original, corrected, explanation(Korean)}.
                        5. Rewrite it into a professional, native 'advancedScript'.
                        6. Provide a warm, encouraging 'feedback' summary in Korean as Eric Kwon.
                        Return strictly JSON.
                    `;

                    const response = await ai.models.generateContent({
                        model: model,
                        contents: {
                            parts: [
                                { inlineData: { mimeType: 'image/png', data: image.split(',')[1] } },
                                { text: prompt }
                            ]
                        },
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: Type.OBJECT,
                                properties: {
                                    transcription: { type: Type.STRING },
                                    fullCorrectedText: { type: Type.STRING },
                                    advancedScript: { type: Type.STRING },
                                    scores: {
                                        type: Type.OBJECT,
                                        properties: { grammar: {type:Type.NUMBER}, vocabulary: {type:Type.NUMBER}, naturalness: {type:Type.NUMBER} }
                                    },
                                    corrections: {
                                        type: Type.ARRAY,
                                        items: {
                                            type: Type.OBJECT,
                                            properties: { original: {type:Type.STRING}, corrected: {type:Type.STRING}, explanation: {type:Type.STRING} }
                                        }
                                    },
                                    feedback: { type: Type.STRING }
                                },
                                required: ["transcription", "fullCorrectedText", "advancedScript", "scores", "corrections", "feedback"]
                            }
                        }
                    });

                    const jsonText = response.text;
                    setResult(JSON.parse(jsonText));
                    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 300);
                } catch (err) {
                    setError(`분석 실패: ${err.message || "알 수 없는 오류가 발생했습니다. 이미지를 다시 찍어주세요."}`);
                    console.error("Analysis Error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const speak = (text) => {
                const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-50 px-4 py-4 shadow-sm">
                        <div className="max-w-xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i className="fa-solid fa-pen-nib"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-slate-900 leading-tight">에릭권 영작문 클래스</h1>
                                    <p className="text-[10px] text-indigo-500 font-black tracking-widest uppercase">AI Writing Tutor</p>
                                </div>
                            </div>
                            <button 
                                onClick={() => {
                                    navigator.clipboard.writeText(window.location.href);
                                    setShowToast(true);
                                    setTimeout(() => setShowToast(false), 2000);
                                }} 
                                className="text-slate-400 p-2 active:scale-90 transition-transform"
                            >
                                <i className="fa-solid fa-share-nodes text-xl"></i>
                            </button>
                        </div>
                    </header>

                    {showToast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl text-xs font-bold animate-bounce">
                            링크가 복사되었습니다!
                        </div>
                    )}

                    <main className="max-w-xl mx-auto p-4 space-y-6 mt-2">
                        {/* Upload Zone */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <i className="fa-solid fa-cloud-arrow-up text-indigo-500"></i> 손글씨 일기 업로드
                            </h2>
                            <div 
                                className={`relative border-2 border-dashed rounded-2xl h-80 flex flex-col items-center justify-center cursor-pointer transition-all duration-300 overflow-hidden ${isDragging ? 'drag-over' : 'border-slate-200 hover:border-indigo-400 bg-slate-50/30'}`}
                                onClick={() => fileInputRef.current.click()}
                                onDragOver={onDragOver}
                                onDragLeave={onDragLeave}
                                onDrop={onDrop}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileChange} />
                                {image ? (
                                    <img src={image} className="w-full h-full object-contain p-2" alt="Uploaded Preview" />
                                ) : (
                                    <div className="text-center p-8">
                                        <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mx-auto mb-5 border border-slate-100">
                                            <i className="fa-solid fa-camera text-2xl text-slate-300"></i>
                                        </div>
                                        <p className="text-slate-600 font-bold">이미지를 드래그하거나 클릭하세요</p>
                                        <p className="text-slate-400 text-xs mt-3 leading-relaxed">손글씨가 밝고 선명하게 찍히면<br/>에릭권 AI가 더 정확하게 분석해요!</p>
                                    </div>
                                )}
                            </div>
                            
                            {image && !loading && !result && (
                                <button 
                                    onClick={handleAnalyze}
                                    className="w-full mt-6 py-4.5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                                >
                                    <span>에릭권의 분석 시작하기</span>
                                    <i className="fa-solid fa-wand-magic-sparkles text-indigo-300"></i>
                                </button>
                            )}
                        </div>

                        {/* Status Messages */}
                        {loading && (
                            <div className="bg-white rounded-3xl p-12 text-center shadow-sm border border-slate-100 fade-in">
                                <div className="relative w-16 h-16 mx-auto mb-6">
                                    <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                    <div className="absolute inset-0 border-4 border-t-indigo-600 rounded-full animate-spin"></div>
                                </div>
                                <h3 className="text-xl font-bold text-slate-800">정밀 분석 중...</h3>
                                <p className="text-slate-400 mt-2 text-sm italic">"잠시만요, 꼼꼼하게 읽고 있습니다!"</p>
                            </div>
                        )}

                        {error && (
                            <div className="bg-red-50 text-red-600 p-5 rounded-2xl border border-red-100 flex items-start gap-3 fade-in">
                                <i className="fa-solid fa-circle-exclamation mt-1"></i>
                                <div>
                                    <p className="font-bold text-sm">이런, 문제가 발생했어요!</p>
                                    <p className="text-xs mt-1 opacity-80">{error}</p>
                                </div>
                            </div>
                        )}

                        {/* Analysis Results */}
                        {result && (
                            <div className="space-y-6 fade-in">
                                {/* Dashboard Scores */}
                                <div className="grid grid-cols-3 gap-3">
                                    {[
                                        { l: 'Grammar', s: result.scores.grammar, c: 'text-emerald-500', bg: 'bg-emerald-500' },
                                        { l: 'Vocab', s: result.scores.vocabulary, c: 'text-amber-500', bg: 'bg-amber-500' },
                                        { l: 'Natural', s: result.scores.naturalness, c: 'text-indigo-500', bg: 'bg-indigo-500' }
                                    ].map((item, i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                                            <span className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-tighter">{item.l}</span>
                                            <div className={`text-2xl font-black ${item.c}`}>{item.s}</div>
                                            <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
                                                <div className={`h-full score-bar ${item.bg}`} style={{ width: `${item.s * 10}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Full Correction */}
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-5">
                                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <i className="fa-solid fa-check-double text-indigo-500"></i> 교정된 문장
                                        </h2>
                                        <button onClick={() => speak(result.fullCorrectedText)} className="text-indigo-600 text-xs font-bold bg-indigo-50 px-3 py-1.5 rounded-full hover:bg-indigo-100 active:scale-95 transition-all">
                                            <i className="fa-solid fa-volume-high mr-1"></i> 듣기
                                        </button>
                                    </div>
                                    <div 
                                        className="bg-slate-50 p-6 rounded-2xl border border-slate-100 leading-relaxed font-serif text-slate-700 text-lg shadow-inner"
                                        dangerouslySetInnerHTML={{ __html: result.fullCorrectedText.replace(/<b>/g, '<b class="correction-mark">') }}
                                    ></div>
                                </div>

                                {/* Point Corrections */}
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <h2 className="text-lg font-bold text-slate-800 mb-5">상세 피드백 (Point)</h2>
                                    <div className="space-y-5">
                                        {result.corrections.map((corr, i) => (
                                            <div key={i} className="border-b border-slate-50 pb-5 last:border-0 last:pb-0">
                                                <div className="text-red-400 text-xs line-through mb-1 opacity-70">{corr.original}</div>
                                                <div className="flex justify-between items-start gap-3">
                                                    <div className="text-slate-900 font-bold leading-tight text-base">{corr.corrected}</div>
                                                    <button onClick={() => speak(corr.corrected)} className="text-slate-300 hover:text-indigo-400 transition-colors"><i className="fa-solid fa-volume-low"></i></button>
                                                </div>
                                                <div className="text-xs text-slate-500 mt-2.5 bg-indigo-50/30 p-4 rounded-xl italic border border-indigo-100/30 flex items-start gap-2">
                                                    <i className="fa-solid fa-lightbulb text-amber-400 mt-0.5"></i>
                                                    <span>{corr.explanation}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Eric Kwon's Summary */}
                                <div className="bg-slate-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-xl font-bold mb-5 flex items-center gap-2 text-indigo-300">
                                            <i className="fa-solid fa-comment-dots"></i> 에릭권의 코멘트
                                        </h2>
                                        <p className="text-slate-300 leading-relaxed mb-10 text-sm font-medium whitespace-pre-line">{result.feedback}</p>
                                        
                                        <div className="bg-white/10 p-7 rounded-2xl border border-white/5 backdrop-blur-sm shadow-2xl">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></span>
                                                    <span className="text-[10px] font-black text-indigo-300 tracking-widest uppercase">Native Version</span>
                                                </div>
                                                <button onClick={() => speak(result.advancedScript)} className="text-white text-[10px] font-bold bg-white/10 px-3 py-1 rounded-full hover:bg-white/20 transition-all">
                                                    <i className="fa-solid fa-headphones mr-1"></i> Audio
                                                </button>
                                            </div>
                                            <p className="text-xl italic font-serif leading-relaxed text-indigo-50">"{result.advancedScript}"</p>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-quote-right absolute right-[-20px] bottom-[-20px] text-[200px] opacity-[0.03]"></i>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="text-center py-12 text-slate-300 text-[10px] font-black tracking-[0.2em] uppercase">
                        &copy; 2025 Eric Kwon English Class.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
