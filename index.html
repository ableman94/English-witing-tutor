
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에릭권의 영작문 클래스 (AI Writing Tutor)</title>
    
    <!-- Meta Tags -->
    <meta property="og:title" content="에릭권의 영작문 클래스">
    <meta property="og:description" content="AI가 분석하는 나의 손글씨 영어 일기 피드백">
    <meta property="og:type" content="website">

    <!-- Stylesheets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // CRITICAL: Shim to prevent "process is not defined" error in browsers
        window.process = window.process || { env: {} };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; color: #1e293b; }
        .score-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        b.correction-mark { color: #4f46e5; font-weight: 800; background-color: #eef2ff; padding: 0 4px; border-radius: 4px; text-decoration: underline; text-underline-offset: 4px; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <!-- SDK Loader (using dynamic import to ensure Type/Modality are available) -->
    <script type="module">
        import { GoogleGenAI, Type, Modality } from "https://esm.sh/@google/genai@^1.41.0";
        window.GoogleGenAI = GoogleGenAI;
        window.Type = Type;
        window.Modality = Modality;
    </script>

    <script type="text/babel" data-presets="react">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const fileInputRef = useRef(null);

            const processFile = (file) => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImage(ev.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("이미지 파일(PNG, JPG 등)만 업로드할 수 있습니다.");
                }
            };

            const handleAnalyze = async () => {
                if (!image) return;
                if (!window.GoogleGenAI) {
                    alert("AI 엔진 로딩 중입니다. 잠시만 기다려주세요.");
                    return;
                }

                setLoading(true);
                setError(null);

                try {
                    // Create instance inside the function to ensure process.env.API_KEY is accessed at runtime
                    const ai = new window.GoogleGenAI({ apiKey: process.env.API_KEY });
                    const model = 'gemini-3-flash-preview';

                    const mimeType = image.split(';')[0].split(':')[1];
                    const base64Data = image.split(',')[1];

                    const prompt = `
                        Analyze the handwritten English text in this image.
                        1. Transcribe the text accurately.
                        2. Evaluate based on Grammar, Vocabulary, and Naturalness (Scores 0-10).
                        3. Provide specific corrections for errors or unnatural phrasing.
                        4. Provide Eric Kwon's feedback in Korean.
                        5. Create 'fullCorrectedText' with <b> tags around improved words.
                        6. Create 'advancedScript' (Professional Native level rewrite).
                        Return the result in strictly JSON format.
                    `;

                    const response = await ai.models.generateContent({
                        model,
                        contents: {
                            parts: [
                                { inlineData: { mimeType, data: base64Data } },
                                { text: prompt }
                            ]
                        },
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: window.Type.OBJECT,
                                properties: {
                                    transcription: { type: window.Type.STRING },
                                    fullCorrectedText: { type: window.Type.STRING },
                                    advancedScript: { type: window.Type.STRING },
                                    scores: {
                                        type: window.Type.OBJECT,
                                        properties: {
                                            grammar: { type: window.Type.NUMBER },
                                            vocabulary: { type: window.Type.NUMBER },
                                            naturalness: { type: window.Type.NUMBER }
                                        }
                                    },
                                    corrections: {
                                        type: window.Type.ARRAY,
                                        items: {
                                            type: window.Type.OBJECT,
                                            properties: {
                                                original: { type: window.Type.STRING },
                                                corrected: { type: window.Type.STRING },
                                                explanation: { type: window.Type.STRING }
                                            }
                                        }
                                    },
                                    feedback: { type: window.Type.STRING }
                                }
                            }
                        }
                    });

                    const data = JSON.parse(response.text);
                    setResult(data);
                    
                    setTimeout(() => {
                        document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' });
                    }, 500);

                } catch (err) {
                    console.error("Analysis Error:", err);
                    setError(err.message || "분석 실패");
                    alert("분석 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
                } finally {
                    setLoading(false);
                }
            };

            const speakText = async (text) => {
                if (isSpeaking || !window.GoogleGenAI) return;
                setIsSpeaking(true);
                try {
                    const ai = new window.GoogleGenAI({ apiKey: process.env.API_KEY });
                    const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
                    const response = await ai.models.generateContent({
                        model: "gemini-2.5-flash-preview-tts",
                        contents: [{ parts: [{ text: `Speak naturally like a tutor: ${cleanText}` }] }],
                        config: {
                            responseModalities: [window.Modality.AUDIO],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } } }
                        },
                    });

                    const base64Audio = response.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (base64Audio) {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 24000});
                        const binary = atob(base64Audio);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const dataInt16 = new Int16Array(bytes.buffer);
                        const buffer = audioContext.createBuffer(1, dataInt16.length, 24000);
                        buffer.getChannelData(0).set(Array.from(dataInt16).map(v => v / 32768.0));
                        const source = audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(audioContext.destination);
                        source.onended = () => setIsSpeaking(false);
                        source.start();
                    } else setIsSpeaking(false);
                } catch (e) {
                    console.error(e);
                    setIsSpeaking(false);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text.replace(/<\/?[^>]+(>|$)/g, ""));
                alert("교정된 문장이 복사되었습니다.");
            };

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4">
                        <div className="max-w-2xl mx-auto flex items-center gap-4">
                            <div className="bg-indigo-600 w-11 h-11 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200 rotate-3">
                                <i className="fa-solid fa-pen-nib text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold text-slate-900 tracking-tight">에릭권 영작문 클래스</h1>
                                <p className="text-[10px] text-indigo-500 font-black tracking-widest uppercase">Premium AI Tutor Service</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-8 mt-6">
                        {/* Upload Section */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                            <h2 className="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-image text-indigo-500"></i> 영어 일기 사진 올리기
                            </h2>
                            <div 
                                className={`relative border-2 border-dashed rounded-[2rem] h-96 flex flex-col items-center justify-center cursor-pointer transition-all duration-300 ${isDragging ? 'border-indigo-600 bg-indigo-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}
                                onClick={() => !loading && fileInputRef.current.click()}
                                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                onDragLeave={() => setIsDragging(false)}
                                onDrop={(e) => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => e.target.files[0] && processFile(e.target.files[0])} />
                                {image ? (
                                    <img src={image} className="w-full h-full object-contain p-6 rounded-[2rem]" alt="Preview" />
                                ) : (
                                    <div className="text-center">
                                        <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-md border border-slate-100 text-slate-200">
                                            <i className="fa-solid fa-cloud-arrow-up text-4xl"></i>
                                        </div>
                                        <p className="font-bold text-slate-500">사진을 여기로 드래그하거나<br/>클릭해서 업로드하세요</p>
                                    </div>
                                )}
                            </div>
                            {image && !loading && !result && (
                                <button 
                                    onClick={handleAnalyze} 
                                    className="w-full mt-8 py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-3"
                                >
                                    <span>분석 시작하기</span>
                                    <i className="fa-solid fa-wand-magic-sparkles text-indigo-300"></i>
                                </button>
                            )}
                        </div>

                        {loading && (
                            <div className="text-center p-16 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 fade-in">
                                <div className="w-16 h-16 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin mx-auto mb-8"></div>
                                <h3 className="text-xl font-extrabold text-slate-800">에릭권 AI가 분석 중입니다<span className="loading-dots"></span></h3>
                                <p className="text-slate-400 text-sm mt-3">필기체를 읽고 정교한 피드백을 준비하고 있어요.</p>
                            </div>
                        )}

                        {result && (
                            <div id="results-section" className="space-y-8 fade-in">
                                {/* Scores */}
                                <div className="grid grid-cols-3 gap-4">
                                    {['Grammar', 'Vocabulary', 'Naturalness'].map((l) => (
                                        <div key={l} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">{l}</span>
                                            <div className="text-3xl font-black text-slate-900">{result.scores[l.toLowerCase()]}</div>
                                            <div className="w-full bg-slate-100 h-2 rounded-full mt-4 overflow-hidden">
                                                <div className="h-full bg-indigo-500 score-bar shadow-[0_0_8px_rgba(79,70,229,0.5)]" style={{ width: `${result.scores[l.toLowerCase()] * 10}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Main Results */}
                                <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 space-y-8">
                                    <section>
                                        <h3 className="font-black text-slate-400 text-[10px] uppercase tracking-widest mb-4">Original Transcription</h3>
                                        <p className="text-slate-500 font-serif leading-relaxed italic">{result.transcription}</p>
                                    </section>

                                    <hr className="border-slate-50" />

                                    <section>
                                        <div className="flex justify-between items-center mb-5">
                                            <h3 className="font-bold text-slate-800 flex items-center gap-2 text-lg">
                                                <i className="fa-solid fa-check-double text-indigo-500"></i> 교정 결과 (Full Edit)
                                            </h3>
                                            <div className="flex gap-2">
                                                <button onClick={() => copyToClipboard(result.fullCorrectedText)} className="p-2.5 bg-slate-50 text-slate-400 rounded-full hover:text-slate-600 hover:bg-slate-100 transition-all">
                                                    <i className="fa-solid fa-copy"></i>
                                                </button>
                                                <button onClick={() => speakText(result.fullCorrectedText)} disabled={isSpeaking} className={`p-2.5 px-5 bg-indigo-50 text-indigo-600 text-xs font-bold rounded-full hover:bg-indigo-100 transition-all flex items-center gap-2 ${isSpeaking ? 'opacity-50' : ''}`}>
                                                    <i className={`fa-solid ${isSpeaking ? 'fa-spinner animate-spin' : 'fa-volume-high'}`}></i>
                                                    <span>듣기</span>
                                                </button>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-8 rounded-3xl font-serif text-xl leading-relaxed text-slate-700 shadow-inner" dangerouslySetInnerHTML={{ __html: result.fullCorrectedText.replace(/<b>/g, '<b class="correction-mark">') }}></div>
                                    </section>
                                </div>

                                {/* Corrections List */}
                                <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                                    <h3 className="font-bold text-slate-800 mb-6 text-lg flex items-center gap-2">
                                        <i className="fa-solid fa-magnifying-glass-chart text-indigo-500"></i> 상세 교정 포인트
                                    </h3>
                                    <div className="space-y-4">
                                        {result.corrections.map((corr, idx) => (
                                            <div key={idx} className="bg-slate-50/50 p-5 rounded-3xl border border-slate-100 group">
                                                <div className="flex flex-col gap-2">
                                                    <span className="text-red-400 text-xs line-through italic">{corr.original}</span>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-slate-900 font-bold">{corr.corrected}</span>
                                                        <button onClick={() => speakText(corr.corrected)} className="opacity-0 group-hover:opacity-100 transition-all text-indigo-400 hover:text-indigo-600">
                                                            <i className="fa-solid fa-volume-low"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                                <p className="text-[11px] text-slate-500 mt-3 bg-white/80 p-3 rounded-2xl border border-slate-100 leading-relaxed font-medium">{corr.explanation}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Expert Comment */}
                                <div className="bg-slate-900 text-white rounded-[3rem] p-10 shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h3 className="text-xl font-bold mb-6 text-indigo-300 flex items-center gap-3">
                                            <div className="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
                                            에릭권의 최종 코멘트
                                        </h3>
                                        <p className="text-indigo-100/90 leading-relaxed text-sm mb-10 whitespace-pre-line font-medium">{result.feedback}</p>
                                        <div className="bg-white/5 p-8 rounded-3xl border border-white/10 backdrop-blur-md">
                                            <span className="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-4 block italic">Professional Recommendation</span>
                                            <p className="text-2xl italic font-serif leading-tight text-white mb-4">"{result.advancedScript}"</p>
                                            <button onClick={() => speakText(result.advancedScript)} className="text-[10px] font-black uppercase text-indigo-400 hover:text-indigo-300 transition-all flex items-center gap-2">
                                                <i className="fa-solid fa-volume-high"></i> 원어민 버전 듣기
                                            </button>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-quote-right absolute right-[-10px] bottom-[-20px] text-[180px] opacity-[0.03] text-indigo-500"></i>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="text-center py-16 text-slate-300 text-[10px] font-black tracking-[0.4em] uppercase">
                        &copy; 2025 Eric Kwon English Class. Power by Gemini AI.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
