
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에릭권의 영작문 클래스 (AI Writing Tutor)</title>
    
    <!-- Meta Tags -->
    <meta property="og:title" content="에릭권의 영작문 클래스">
    <meta property="og:description" content="AI가 분석하는 나의 손글씨 영어 일기 피드백">
    <meta property="og:type" content="website">

    <!-- Stylesheets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel for Browser Support -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .score-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        b.correction-mark { color: #4f46e5; font-weight: 800; background-color: #eef2ff; padding: 0 4px; border-radius: 4px; text-decoration: underline; text-underline-offset: 4px; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <!-- Main Logic -->
    <script type="text/babel" data-presets="react">
        const { useState, useRef, useEffect } = React;
        // Import Gemini SDK via ESM is not easy in Babel standalone without importmap, 
        // so we use a dynamic import approach or assume global if using a specific CDN.
        // For simplicity and robustness in single-file, we'll use a standard fetch-based API call if needed,
        // but since we must use @google/genai, we will use the global import from esm.sh.
    </script>

    <script type="module">
        import { GoogleGenAI, Type, Modality } from "https://esm.sh/@google/genai@^1.41.0";
        window.GoogleGenAI = GoogleGenAI;
        window.Type = Type;
        window.Modality = Modality;
    </script>

    <script type="text/babel" data-presets="react">
        const App = () => {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [showToast, setShowToast] = useState("");
            const [isSpeaking, setIsSpeaking] = useState(false);
            const fileInputRef = useRef(null);

            const triggerToast = (msg) => {
                setShowToast(msg);
                setTimeout(() => setShowToast(""), 2500);
            };

            const processFile = (file) => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImage(ev.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                } else {
                    setError("이미지 파일만 업로드 가능합니다.");
                }
            };

            const handleAnalyze = async () => {
                if (!image) return;
                setLoading(true);
                setError(null);

                try {
                    const apiKey = window.process?.env?.API_KEY || ""; // This is handled by the platform environment
                    const ai = new window.GoogleGenAI({ apiKey });
                    const model = 'gemini-3-flash-preview';

                    const mimeType = image.split(';')[0].split(':')[1];
                    const base64Data = image.split(',')[1];

                    const response = await ai.models.generateContent({
                        model,
                        contents: {
                            parts: [
                                { inlineData: { mimeType, data: base64Data } },
                                { text: "Analyze the handwriting. Transcribe, fullCorrectedText (with <b> tags), scores (0-10), detailed corrections, and Eric Kwon's feedback in Korean. Also a natural 'advancedScript'. Return strictly JSON." }
                            ]
                        },
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: window.Type.OBJECT,
                                properties: {
                                    transcription: { type: window.Type.STRING },
                                    fullCorrectedText: { type: window.Type.STRING },
                                    advancedScript: { type: window.Type.STRING },
                                    scores: {
                                        type: window.Type.OBJECT,
                                        properties: {
                                            grammar: { type: window.Type.NUMBER },
                                            vocabulary: { type: window.Type.NUMBER },
                                            naturalness: { type: window.Type.NUMBER }
                                        }
                                    },
                                    corrections: {
                                        type: window.Type.ARRAY,
                                        items: {
                                            type: window.Type.OBJECT,
                                            properties: {
                                                original: { type: window.Type.STRING },
                                                corrected: { type: window.Type.STRING },
                                                explanation: { type: window.Type.STRING }
                                            }
                                        }
                                    },
                                    feedback: { type: window.Type.STRING }
                                }
                            }
                        }
                    });

                    let rawText = response.text || "";
                    rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    setResult(JSON.parse(rawText));
                    
                    setTimeout(() => {
                        document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' });
                    }, 300);
                } catch (err) {
                    setError(`분석 실패: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            };

            const speakWithGemini = async (text) => {
                if (isSpeaking) return;
                setIsSpeaking(true);
                try {
                    const apiKey = window.process?.env?.API_KEY || "";
                    const ai = new window.GoogleGenAI({ apiKey });
                    const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
                    const response = await ai.models.generateContent({
                        model: "gemini-2.5-flash-preview-tts",
                        contents: [{ parts: [{ text: `Read naturally: ${cleanText}` }] }],
                        config: {
                            responseModalities: [window.Modality.AUDIO],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } } }
                        },
                    });
                    const base64Audio = response.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (base64Audio) {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 24000});
                        const binary = atob(base64Audio);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const dataInt16 = new Int16Array(bytes.buffer);
                        const buffer = audioContext.createBuffer(1, dataInt16.length, 24000);
                        buffer.getChannelData(0).set(Array.from(dataInt16).map(v => v / 32768.0));
                        const source = audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(audioContext.destination);
                        source.onended = () => setIsSpeaking(false);
                        source.start();
                    } else setIsSpeaking(false);
                } catch { setIsSpeaking(false); }
            };

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    <header className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-4">
                        <div className="max-w-xl mx-auto flex items-center gap-3">
                            <div className="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg rotate-3">
                                <i className="fa-solid fa-pen-nib"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-extrabold text-slate-900">에릭권 영작문 클래스</h1>
                                <p className="text-[10px] text-indigo-500 font-black tracking-widest uppercase">Premium AI Tutor</p>
                            </div>
                        </div>
                    </header>

                    {showToast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl text-xs font-bold animate-bounce">
                            {showToast}
                        </div>
                    )}

                    <main className="max-w-xl mx-auto p-4 space-y-6 mt-4">
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                            <h2 className="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-camera text-indigo-500"></i> 일기 사진 업로드
                            </h2>
                            <div 
                                className={`relative border-2 border-dashed rounded-3xl h-80 flex flex-col items-center justify-center cursor-pointer transition-all duration-500 ${isDragging ? 'border-indigo-600 bg-indigo-50' : 'border-slate-200 bg-slate-50'}`}
                                onClick={() => fileInputRef.current.click()}
                                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                onDragLeave={() => setIsDragging(false)}
                                onDrop={(e) => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => e.target.files[0] && processFile(e.target.files[0])} />
                                {image ? <img src={image} className="w-full h-full object-contain p-4 rounded-3xl" /> : 
                                <div className="text-center text-slate-400">
                                    <i className="fa-solid fa-camera text-4xl mb-3"></i>
                                    <p className="font-bold">사진을 여기에 끌어오세요</p>
                                </div>}
                            </div>
                            {image && !loading && !result && (
                                <button onClick={handleAnalyze} className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">
                                    에릭권의 분석 시작하기
                                </button>
                            )}
                        </div>

                        {loading && <div className="text-center p-10 bg-white rounded-3xl shadow-sm border border-slate-100">
                            <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="font-bold text-slate-800">에릭권 AI가 정밀 분석 중...</p>
                        </div>}

                        {result && (
                            <div id="results-section" className="space-y-6 fade-in">
                                <div className="grid grid-cols-3 gap-3">
                                    {['Grammar', 'Vocab', 'Natural'].map((l, i) => (
                                        <div key={l} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase">{l}</span>
                                            <div className="text-2xl font-black text-slate-900">{Object.values(result.scores)[i]}</div>
                                            <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
                                                <div className="h-full bg-indigo-500 score-bar" style={{ width: `${Object.values(result.scores)[i] * 10}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="font-bold text-slate-800">교정된 문장</h2>
                                        <button onClick={() => speakWithGemini(result.fullCorrectedText)} className="text-indigo-600 text-xs font-bold bg-indigo-50 px-3 py-1 rounded-full">
                                            <i className="fa-solid fa-volume-high"></i> 듣기
                                        </button>
                                    </div>
                                    <p className="bg-slate-50 p-6 rounded-2xl font-serif text-lg leading-relaxed text-slate-700 shadow-inner" dangerouslySetInnerHTML={{ __html: result.fullCorrectedText.replace(/<b>/g, '<b class="correction-mark">') }}></p>
                                </div>

                                <div className="bg-slate-900 text-white rounded-4xl p-8 shadow-2xl">
                                    <h2 className="text-xl font-bold mb-4 text-indigo-300">에릭권의 최종 코멘트</h2>
                                    <p className="text-indigo-100/80 leading-relaxed text-sm mb-6 whitespace-pre-line">{result.feedback}</p>
                                    <div className="bg-white/5 p-6 rounded-2xl border border-white/10">
                                        <span className="text-[10px] font-black text-indigo-300 uppercase italic">Native Recommendation</span>
                                        <p className="text-xl italic font-serif mt-2">"{result.advancedScript}"</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="text-center py-10 text-slate-300 text-[10px] font-black tracking-widest uppercase">&copy; 2025 Eric Kwon English Class.</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
