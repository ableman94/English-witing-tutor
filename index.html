
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>에릭권의 영작문 클래스 (AI Writing Tutor)</title>
    
    <!-- SEO & Social Sharing -->
    <meta property="og:title" content="에릭권의 영작문 클래스">
    <meta property="og:description" content="AI가 분석하는 나의 손글씨 영어 일기 피드백">
    <meta property="og:type" content="website">

    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel for In-Browser Execution (GitHub Pages Compatible) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .score-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        b.correction-mark { color: #4f46e5; font-weight: 800; background-color: #eef2ff; padding: 0 2px; border-radius: 4px; text-decoration: underline; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 앱 컴포넌트 시작 ---
        const App = () => {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [showToast, setShowToast] = useState(false);
            const fileInputRef = useRef(null);

            // 분석 API 호출
            const handleAnalyze = async () => {
                if (!image) return;
                setLoading(true);
                setError(null);

                try {
                    // Google GenAI SDK를 동적으로 로드
                    const { GoogleGenAI, Type } = await import("https://esm.sh/@google/genai@^1.41.0");
                    const ai = new GoogleGenAI({ apiKey: window.process?.env?.API_KEY || "" });
                    
                    const response = await ai.models.generateContent({
                        model: 'gemini-3-flash-preview',
                        contents: {
                            parts: [
                                { inlineData: { mimeType: 'image/png', data: image.split(',')[1] } },
                                { text: "Analyze the handwritten English text in this image. Provide: transcription, fullCorrectedText(use <b> tags for changes), advancedScript(professional native version), scores(grammar, vocabulary, naturalness 0-10), corrections(list of {original, corrected, explanation}), and a feedback summary in Korean. Return strictly JSON." }
                            ]
                        },
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: Type.OBJECT,
                                properties: {
                                    transcription: { type: Type.STRING },
                                    fullCorrectedText: { type: Type.STRING },
                                    advancedScript: { type: Type.STRING },
                                    scores: {
                                        type: Type.OBJECT,
                                        properties: { grammar: {type:Type.NUMBER}, vocabulary: {type:Type.NUMBER}, naturalness: {type:Type.NUMBER} }
                                    },
                                    corrections: {
                                        type: Type.ARRAY,
                                        items: {
                                            type: Type.OBJECT,
                                            properties: { original: {type:Type.STRING}, corrected: {type:Type.STRING}, explanation: {type:Type.STRING} }
                                        }
                                    },
                                    feedback: { type: Type.STRING }
                                },
                                required: ["transcription", "fullCorrectedText", "advancedScript", "scores", "corrections", "feedback"]
                            }
                        }
                    });

                    setResult(JSON.parse(response.text));
                    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 300);
                } catch (err) {
                    setError("이미지를 분석하는 중 오류가 발생했습니다. 글씨가 잘 보이도록 다시 찍어주세요.");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const onFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setImage(ev.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const speak = (text) => {
                const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            };

            const copyLink = () => {
                navigator.clipboard.writeText(window.location.href);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 2000);
            };

            return (
                <div className="min-h-screen pb-20">
                    {showToast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-bold">
                            공유 링크가 복사되었습니다!
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
                        <div className="max-w-xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i className="fa-solid fa-pen-nib"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-slate-900 leading-tight">에릭권 영작문 클래스</h1>
                                    <p className="text-[10px] text-indigo-500 font-black tracking-widest uppercase">AI Writing Tutor</p>
                                </div>
                            </div>
                            <button onClick={copyLink} className="text-slate-400 p-2"><i className="fa-solid fa-share-nodes text-xl"></i></button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto p-4 space-y-6 mt-2">
                        {/* Upload Card */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <i className="fa-solid fa-image text-indigo-500"></i> 손글씨 일기 업로드
                            </h2>
                            <div 
                                className={`relative border-2 border-dashed rounded-2xl h-72 flex flex-col items-center justify-center cursor-pointer transition-all overflow-hidden ${image ? 'border-indigo-100 bg-indigo-50/10' : 'border-slate-200 hover:border-indigo-400'}`}
                                onClick={() => fileInputRef.current.click()}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={onFileChange} />
                                {image ? (
                                    <img src={image} className="w-full h-full object-contain" />
                                ) : (
                                    <div className="text-center p-6">
                                        <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <i className="fa-solid fa-camera text-2xl text-slate-300"></i>
                                        </div>
                                        <p className="text-slate-600 font-bold">사진을 찍거나 선택하세요</p>
                                        <p className="text-slate-400 text-xs mt-2">노트의 글씨가 잘 보이게 찍어주세요!</p>
                                    </div>
                                )}
                            </div>
                            {image && !loading && !result && (
                                <button 
                                    onClick={handleAnalyze}
                                    className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all"
                                >
                                    에릭권의 분석 시작하기
                                </button>
                            )}
                        </div>

                        {/* Loading State */}
                        {loading && (
                            <div className="bg-white rounded-3xl p-12 text-center shadow-sm border border-slate-100">
                                <div className="w-12 h-12 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin mx-auto mb-6"></div>
                                <h3 className="text-xl font-bold text-slate-800">문장을 정밀하게 분석 중입니다</h3>
                                <p className="text-slate-400 mt-2 text-sm italic">"조금만 기다려주세요, 에릭권이 읽고 있어요!"</p>
                            </div>
                        )}

                        {error && (
                            <div className="bg-red-50 text-red-600 p-5 rounded-2xl border border-red-100 flex items-start gap-3 fade-in">
                                <i className="fa-solid fa-circle-exclamation mt-1"></i>
                                <p className="font-bold text-sm">{error}</p>
                            </div>
                        )}

                        {/* Analysis Results */}
                        {result && (
                            <div className="space-y-6 fade-in">
                                {/* Dashboard Scores */}
                                <div className="grid grid-cols-3 gap-3">
                                    {[
                                        { l: 'Grammar', s: result.scores.grammar, c: 'text-emerald-500', bg: 'bg-emerald-500' },
                                        { l: 'Vocab', s: result.scores.vocabulary, c: 'text-amber-500', bg: 'bg-amber-500' },
                                        { l: 'Natural', s: result.scores.naturalness, c: 'text-indigo-500', bg: 'bg-indigo-500' }
                                    ].map((item, i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                                            <span className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-tighter">{item.l}</span>
                                            <div className={`text-2xl font-black ${item.c}`}>{item.s}</div>
                                            <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
                                                <div className={`h-full score-bar ${item.bg}`} style={{ width: `${item.s * 10}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Full Correction */}
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-lg font-bold text-slate-800">교정된 일기</h2>
                                        <button onClick={() => speak(result.fullCorrectedText)} className="text-indigo-600 text-sm font-bold flex items-center gap-1">
                                            <i className="fa-solid fa-volume-high"></i> Listen
                                        </button>
                                    </div>
                                    <div 
                                        className="bg-slate-50 p-5 rounded-2xl border border-slate-100 leading-relaxed font-serif text-slate-700 text-lg"
                                        dangerouslySetInnerHTML={{ __html: result.fullCorrectedText.replace(/<b>/g, '<b class="correction-mark">') }}
                                    ></div>
                                </div>

                                {/* Point Corrections */}
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4">상세 교정 (Point)</h2>
                                    <div className="space-y-4">
                                        {result.corrections.map((corr, i) => (
                                            <div key={i} className="border-b border-slate-50 pb-4 last:border-0">
                                                <div className="text-red-400 text-xs line-through mb-1">{corr.original}</div>
                                                <div className="flex justify-between items-start gap-2">
                                                    <div className="text-slate-900 font-bold leading-tight">{corr.corrected}</div>
                                                    <button onClick={() => speak(corr.corrected)} className="text-indigo-400 shrink-0"><i className="fa-solid fa-volume-low"></i></button>
                                                </div>
                                                <div className="text-xs text-slate-500 mt-2 bg-slate-50 p-3 rounded-xl italic border border-slate-100">{corr.explanation}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Feedback & Advanced Rewrite */}
                                <div className="bg-slate-900 text-white rounded-3xl p-8 shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                                            <i className="fa-solid fa-comment-dots text-indigo-400"></i> 에릭권의 총평
                                        </h2>
                                        <p className="text-slate-300 leading-relaxed mb-10 text-sm">{result.feedback}</p>
                                        
                                        <div className="bg-white/10 p-6 rounded-2xl border border-white/5 backdrop-blur-sm">
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-[10px] font-black text-indigo-300 tracking-widest uppercase">Advanced Version</span>
                                                <button onClick={() => speak(result.advancedScript)} className="text-white text-xs underline opacity-60">Listen Audio</button>
                                            </div>
                                            <p className="text-lg italic font-serif leading-relaxed">"{result.advancedScript}"</p>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-quote-right absolute right-[-10px] bottom-[-10px] text-9xl opacity-5"></i>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="text-center py-10 text-slate-300 text-[10px] font-bold tracking-widest uppercase">
                        &copy; 2025 Eric Kwon English Class. All rights reserved.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
